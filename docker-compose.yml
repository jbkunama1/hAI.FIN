version: "3.9"

services:

  agent:
    build: .
    container_name: haifin-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    command: python -m src.agent
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  dashboard:
    build: .
    container_name: haifin-dashboard
    restart: unless-stopped
    env_file: .env
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    command: streamlit run dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --browser.gatherUsageStats false
    depends_on:
      - agent
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  logs:
